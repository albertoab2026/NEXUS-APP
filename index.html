<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Dental Pro - Alberto Ballarta</title>
    <style>
        body {
            background-color: #000; /* Fondo Negro como el que te gustó */
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        h2 { color: #00acc1; }
        .stats {
            background: #222;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            color: #ffc107;
            font-weight: bold;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }
        th { background-color: #00acc1; color: #000; }
        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
        }
        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-add { background-color: #2e7d32; color: white; }
        .btn-sell { background-color: #ff9800; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>🦷 DENTAL STOCK PRO</h2>
    <p>Gestión de Alberto Ballarta</p>

    <div class="stats">
        💰 VENTAS DEL DÍA: S/ <span id="totalDia">0.00</span>
    </div>

    <div style="text-align: left; margin-bottom: 20px;">
        <label>Ingresar Nuevo Stock:</label>
        <input type="text" id="i_nombre" placeholder="Producto (ej: Guantes)">
        <input type="number" id="i_cant" placeholder="Cantidad">
        <input type="number" id="i_precio" placeholder="Precio Venta S/">
        <button class="btn btn-add" onclick="agregarProducto()">+ AGREGAR A PLANILLA</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock</th>
                <th>Precio</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="tablaCuerpo">
            <tr>
                <td>Resina A2</td>
                <td>10</td>
                <td>S/ 45</td>
                <td><button onclick="vender(45)">Vender</button></td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    let totalCaja = 0;

    function agregarProducto() {
        // Esta función luego enviará los datos a AWS DynamoDB
        alert("Enviando a AWS...");
    }

    function vender(precio) {
        totalCaja += precio;
        document.getElementById('totalDia').innerText = totalCaja.toFixed(2);
        alert("Venta registrada en AWS");
    }
</script>

</body>
</html>
